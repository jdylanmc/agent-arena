#---------------------------------------------------------------------------------------------
# .github/workflows/ci.yml
#
# Per FR-032/033/034:
#   - Run on ubuntu-latest AND windows-latest.
#   - Install dependencies, lint (ESLint), type-check (tsc), run unit
#     tests (vitest), produce the .vsix as a build artifact via vsce.
#   - DO NOT exercise the live Copilot SDK — the SdkAdapter test seam
#     (CD-03) substitutes the FakeSdkAdapter for unit tests; live-SDK
#     verification is documented manual step in extension/README.md
#     (FR-035) and never runs in CI (FR-033).
#   - Fail the build on any lint / type / test / package error (FR-034).
#
# Triggered on every push and pull-request targeting main, plus manual
# workflow_dispatch for ad-hoc runs.
#
# Author attribution: copilot(developer:opus-4.7)
#---------------------------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (host + webview)
        run: npm run build

      - name: Package extension (vsce)
        # Live-SDK verification (FR-035) is manual; CI never spawns the
        # real Copilot CLI. Packaging only.
        run: npm run package

      - name: Upload .vsix artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agent-arena-${{ matrix.os }}.vsix
          path: extension/*.vsix
          if-no-files-found: error
          retention-days: 14
